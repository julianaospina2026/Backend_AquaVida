spring.application.name=proyecto-acueducto

spring.datasource.url=jdbc:mysql://localhost:3306/proyecto_acueducto
spring.datasource.username=root
spring.datasource.password=Juliana_2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
